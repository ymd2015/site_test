site_name: Wiki
site_description: Wiki powered by MkDocs
# site_url はデプロイ時にGitHub Actionsが自動設定します
docs_dir: docs
site_dir: site

edit_uri: edit/main/docs/

theme:
  name: material
  language: ja
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替

plugins:
  - search:
      lang: ja
  - tags:

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/<your-org>/<your-repo>

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/diary.js

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - ホーム: index.md
  - タグ一覧: tags.md
  # カテゴリ構造が決まったらここに追加
